version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: reg-tech-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-regtech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regtech_secret}
      POSTGRES_DB: ${POSTGRES_DB:-regtech}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regtech} -d ${POSTGRES_DB:-regtech}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - reg-tech-network

  redis:
    image: redis:7-alpine
    container_name: reg-tech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - reg-tech-network

  minio:
    image: minio/minio:latest
    container_name: reg-tech-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-regtech_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-regtech_minio_secret}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - reg-tech-network

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: reg-tech-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-regtech}:${POSTGRES_PASSWORD:-regtech_secret}@postgres:5432/${POSTGRES_DB:-regtech}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-regtech_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-regtech_minio_secret}
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - reg-tech-network

networks:
  reg-tech-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
