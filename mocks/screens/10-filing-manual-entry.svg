<svg width="1200" height="1000" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, SF Pro Display, Inter, sans-serif">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04"/>
    </filter>
    <filter id="bottomBarShadow">
      <feDropShadow dx="0" dy="-2" stdDeviation="8" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="1000" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="56" fill="#ffffff"/>
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="35" font-size="17" font-weight="600" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="108" cy="30" r="4" fill="#0071e3"/>

  <!-- Nav pills -->
  <rect x="420" y="14" width="80" height="28" rx="14" fill="#f5f5f7"/>
  <text x="460" y="33" font-size="13" fill="#1d1d1f" text-anchor="middle">Dashboard</text>
  <rect x="510" y="14" width="72" height="28" rx="14" fill="#0071e3"/>
  <text x="546" y="33" font-size="13" fill="#ffffff" text-anchor="middle">Filings</text>
  <rect x="592" y="14" width="80" height="28" rx="14" fill="#f5f5f7"/>
  <text x="632" y="33" font-size="13" fill="#1d1d1f" text-anchor="middle">Entities</text>
  <rect x="682" y="14" width="72" height="28" rx="14" fill="#f5f5f7"/>
  <text x="718" y="33" font-size="13" fill="#1d1d1f" text-anchor="middle">Reports</text>

  <!-- Avatar -->
  <circle cx="1140" cy="28" r="16" fill="#f5f5f7"/>
  <text x="1140" y="33" font-size="11" font-weight="500" fill="#6e6e73" text-anchor="middle">JD</text>

  <!-- Breadcrumb -->
  <text x="40" y="92" font-size="13" fill="#6e6e73">Filings</text>
  <text x="80" y="92" font-size="13" fill="#86868b">/</text>
  <text x="92" y="92" font-size="13" fill="#1d1d1f">CRS Annual 2025</text>

  <!-- Title + status -->
  <text x="40" y="130" font-size="28" font-weight="600" fill="#1d1d1f">CRS Annual 2025</text>
  <rect x="250" y="112" width="52" height="24" rx="12" fill="#f5f5f7"/>
  <text x="276" y="128" font-size="12" fill="#86868b" text-anchor="middle">Draft</text>

  <!-- Tab bar -->
  <rect x="40" y="156" width="104" height="32" rx="10" fill="#f5f5f7"/>
  <text x="92" y="176" font-size="13" fill="#1d1d1f" text-anchor="middle">Upload XML</text>
  <rect x="152" y="156" width="112" height="32" rx="10" fill="#0071e3"/>
  <text x="208" y="176" font-size="13" fill="#ffffff" text-anchor="middle">Manual Entry</text>
  <rect x="272" y="156" width="92" height="32" rx="10" fill="#f5f5f7"/>
  <text x="318" y="176" font-size="13" fill="#1d1d1f" text-anchor="middle">Validation</text>

  <!-- Content card -->
  <rect x="40" y="210" width="1120" height="700" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Section: Reporting FI -->
  <text x="72" y="252" font-size="16" font-weight="600" fill="#1d1d1f">OECD CRS Reporting Financial Institution</text>

  <!-- FI Name field -->
  <text x="72" y="284" font-size="12" fill="#6e6e73">FI Name</text>
  <rect x="72" y="292" width="400" height="40" rx="10" fill="#f5f5f7"/>
  <text x="88" y="317" font-size="14" fill="#1d1d1f">Celtic Financial Services Ltd</text>

  <!-- TIN field -->
  <text x="492" y="284" font-size="12" fill="#6e6e73">TIN</text>
  <rect x="492" y="292" width="260" height="40" rx="10" fill="#f5f5f7"/>
  <text x="508" y="317" font-size="14" fill="#1d1d1f">BM123456789</text>

  <!-- Country field -->
  <text x="772" y="284" font-size="12" fill="#6e6e73">Country</text>
  <rect x="772" y="292" width="100" height="40" rx="10" fill="#f5f5f7"/>
  <text x="788" y="317" font-size="14" fill="#1d1d1f">BM</text>

  <!-- Separator -->
  <line x1="72" y1="360" x2="1128" y2="360" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Section: Account Reports -->
  <text x="72" y="400" font-size="16" font-weight="600" fill="#1d1d1f">Account Reports</text>
  <rect x="206" y="385" width="88" height="22" rx="11" fill="#eef6ff"/>
  <text x="250" y="400" font-size="12" fill="#0550ae" text-anchor="middle">2 accounts</text>

  <!-- Account card 1 -->
  <rect x="72" y="424" width="1056" height="80" rx="12" fill="#fafafa"/>
  <text x="96" y="456" font-size="15" font-weight="500" fill="#1d1d1f">Hans Mueller</text>
  <text x="96" y="478" font-size="13" fill="#6e6e73">DE-12345678901</text>
  <text x="280" y="478" font-size="13" fill="#86868b">·</text>
  <text x="296" y="478" font-size="13" fill="#6e6e73">Account ending ...5678</text>
  <text x="480" y="478" font-size="13" fill="#86868b">·</text>
  <text x="496" y="478" font-size="13" fill="#1d1d1f" font-weight="500">EUR 125,430.50</text>
  <!-- Edit icon -->
  <rect x="1068" y="445" width="36" height="36" rx="8" fill="#f5f5f7"/>
  <path d="M1080 467 L1090 457 L1094 461 L1084 471 L1079 472 Z" stroke="#6e6e73" stroke-width="1.2" fill="none"/>

  <!-- Separator -->
  <line x1="96" y1="516" x2="1104" y2="516" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Account card 2 -->
  <rect x="72" y="528" width="1056" height="80" rx="12" fill="#fafafa"/>
  <text x="96" y="560" font-size="15" font-weight="500" fill="#1d1d1f">Marie Dupont</text>
  <text x="96" y="582" font-size="13" fill="#6e6e73">FR-1234567890123</text>
  <text x="296" y="582" font-size="13" fill="#86868b">·</text>
  <text x="312" y="582" font-size="13" fill="#6e6e73">Account ending ...3456</text>
  <text x="496" y="582" font-size="13" fill="#86868b">·</text>
  <text x="512" y="582" font-size="13" fill="#1d1d1f" font-weight="500">EUR 89,200.00</text>
  <!-- Edit icon -->
  <rect x="1068" y="549" width="36" height="36" rx="8" fill="#f5f5f7"/>
  <path d="M1080 571 L1090 561 L1094 565 L1084 575 L1079 576 Z" stroke="#6e6e73" stroke-width="1.2" fill="none"/>

  <!-- Add account button -->
  <rect x="72" y="632" width="148" height="40" rx="10" fill="#f5f5f7"/>
  <text x="96" y="656" font-size="16" fill="#0071e3">+</text>
  <text x="112" y="657" font-size="14" font-weight="500" fill="#1d1d1f">Add account</text>

  <!-- Bottom bar -->
  <rect x="0" y="940" width="1200" height="60" fill="#ffffff" filter="url(#bottomBarShadow)"/>
  <rect x="960" y="954" width="160" height="36" rx="10" fill="#0071e3"/>
  <text x="1040" y="977" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">Submit for Validation</text>
  <rect x="820" y="954" width="120" height="36" rx="10" fill="#f5f5f7"/>
  <text x="880" y="977" font-size="14" font-weight="500" fill="#1d1d1f" text-anchor="middle">Save Draft</text>
</svg>