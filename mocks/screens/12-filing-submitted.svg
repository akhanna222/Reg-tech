<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, SF Pro Display, Inter, sans-serif">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="600" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="56" fill="#ffffff"/>
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="35" font-size="17" font-weight="600" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="108" cy="30" r="4" fill="#0071e3"/>

  <!-- Nav pills -->
  <rect x="420" y="14" width="80" height="28" rx="14" fill="#f5f5f7"/>
  <text x="460" y="33" font-size="13" fill="#1d1d1f" text-anchor="middle">Dashboard</text>
  <rect x="510" y="14" width="72" height="28" rx="14" fill="#0071e3"/>
  <text x="546" y="33" font-size="13" fill="#ffffff" text-anchor="middle">Filings</text>
  <rect x="592" y="14" width="80" height="28" rx="14" fill="#f5f5f7"/>
  <text x="632" y="33" font-size="13" fill="#1d1d1f" text-anchor="middle">Entities</text>
  <rect x="682" y="14" width="72" height="28" rx="14" fill="#f5f5f7"/>
  <text x="718" y="33" font-size="13" fill="#1d1d1f" text-anchor="middle">Reports</text>

  <!-- Avatar -->
  <circle cx="1140" cy="28" r="16" fill="#f5f5f7"/>
  <text x="1140" y="33" font-size="11" font-weight="500" fill="#6e6e73" text-anchor="middle">JD</text>

  <!-- Centered success card -->
  <rect x="350" y="90" width="500" height="470" rx="20" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Green checkmark circle -->
  <circle cx="600" cy="155" r="32" fill="none" stroke="#1a7f37" stroke-width="2"/>
  <path d="M584 155 L596 167 L618 143" stroke="#1a7f37" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="600" y="218" font-size="28" font-weight="600" fill="#1d1d1f" text-anchor="middle">Filing submitted</text>
  <text x="600" y="246" font-size="14" fill="#6e6e73" text-anchor="middle">Your OECD CRS filing has been submitted for processing</text>

  <!-- Info items -->
  <line x1="400" y1="272" x2="800" y2="272" stroke="#f0f0f0" stroke-width="1"/>

  <text x="420" y="304" font-size="13" fill="#86868b">Reference</text>
  <text x="780" y="304" font-size="13" fill="#1d1d1f" text-anchor="end" font-family="SF Mono, monospace">BM-2025-CRS-00042</text>

  <text x="420" y="340" font-size="13" fill="#86868b">Type</text>
  <text x="780" y="340" font-size="13" fill="#1d1d1f" text-anchor="end">CRS (OECD Common Reporting Standard)</text>

  <text x="420" y="376" font-size="13" fill="#86868b">Submitted</text>
  <text x="780" y="376" font-size="13" fill="#1d1d1f" text-anchor="end">15 March 2026, 14:32</text>

  <!-- Info box -->
  <rect x="400" y="400" width="400" height="40" rx="10" fill="#eef6ff"/>
  <text x="600" y="425" font-size="12" fill="#0550ae" text-anchor="middle">Validated against OECD CRS XML Schema v2.0</text>

  <!-- Buttons -->
  <rect x="420" y="464" width="160" height="40" rx="10" fill="#0071e3"/>
  <text x="500" y="489" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">View submissions</text>
  <rect x="596" y="464" width="140" height="40" rx="10" fill="#f5f5f7"/>
  <text x="666" y="489" font-size="14" font-weight="500" fill="#1d1d1f" text-anchor="middle">Create another</text>
</svg>