<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Page Background -->
  <rect width="1200" height="700" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="64" fill="#ffffff"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="18" font-weight="700" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="127" cy="33" r="3" fill="#0071e3"/>
  <text x="145" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Tax Reporting Portal</text>

  <!-- Card Shadow Filter -->
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Centered Card -->
  <rect x="390" y="120" width="420" height="490" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Title -->
  <text x="600" y="180" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="28" font-weight="700" fill="#1d1d1f" text-anchor="middle">Welcome back</text>
  <text x="600" y="208" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" fill="#6e6e73" text-anchor="middle">Sign in to OECD Tax Reporting Portal</text>

  <!-- Email Input -->
  <text x="430" y="255" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#1d1d1f">Email</text>
  <rect x="430" y="265" width="340" height="48" rx="10" fill="#f5f5f7"/>
  <text x="450" y="295" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">name@company.com</text>

  <!-- Password Input -->
  <text x="430" y="340" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#1d1d1f">Password</text>
  <rect x="430" y="350" width="340" height="48" rx="10" fill="#f5f5f7"/>
  <text x="450" y="380" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Enter your password</text>

  <!-- Forgot Password -->
  <text x="770" y="418" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#0071e3" text-anchor="end">Forgot password?</text>

  <!-- Sign In Button -->
  <rect x="430" y="435" width="340" height="50" rx="10" fill="#0071e3"/>
  <text x="600" y="466" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="16" font-weight="500" fill="#ffffff" text-anchor="middle">Sign In</text>

  <!-- Divider -->
  <line x1="430" y1="512" x2="565" y2="512" stroke="#f0f0f0" stroke-width="1"/>
  <text x="600" y="516" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" fill="#86868b" text-anchor="middle">or</text>
  <line x1="635" y1="512" x2="770" y2="512" stroke="#f0f0f0" stroke-width="1"/>

  <!-- SSO Button -->
  <rect x="430" y="535" width="340" height="50" rx="10" fill="#f5f5f7"/>
  <text x="600" y="566" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" font-weight="500" fill="#1d1d1f" text-anchor="middle">Sign in with SSO</text>
</svg>