<svg width="1200" height="1400" viewBox="0 0 1200 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Page Background -->
  <rect width="1200" height="1400" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="64" fill="#ffffff"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="18" font-weight="700" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="127" cy="33" r="3" fill="#0071e3"/>
  <text x="145" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Tax Reporting Portal</text>

  <!-- Card Shadow Filter -->
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Page Title -->
  <text x="240" y="130" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="32" font-weight="700" fill="#1d1d1f">Enrol your entity</text>
  <text x="240" y="158" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" fill="#6e6e73">Register under OECD CRS / CbC framework</text>

  <!-- Form Card -->
  <rect x="240" y="190" width="720" height="1150" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Section 1: Entity Information -->
  <text x="280" y="240" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="11" font-weight="600" fill="#86868b" letter-spacing="1">ENTITY INFORMATION</text>

  <!-- Entity Name -->
  <text x="280" y="280" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">Entity Name</text>
  <rect x="280" y="290" width="640" height="48" rx="10" fill="#f5f5f7"/>
  <text x="300" y="320" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Enter your entity's legal name</text>

  <!-- Entity Type -->
  <text x="280" y="368" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">Entity Type</text>
  <rect x="280" y="378" width="640" height="48" rx="10" fill="#f5f5f7"/>
  <text x="300" y="408" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">Select entity type</text>
  <!-- Chevron -->
  <path d="M896 400L900 405L904 400" stroke="#86868b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- OECD Reporting Type -->
  <text x="280" y="456" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">OECD Reporting Type</text>
  <rect x="280" y="466" width="640" height="48" rx="10" fill="#f5f5f7"/>
  <text x="300" y="496" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">CRS / CbC / CRS &amp; CbC</text>
  <path d="M896 488L900 493L904 488" stroke="#86868b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- GIIN -->
  <text x="280" y="544" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">GIIN</text>
  <rect x="280" y="554" width="640" height="48" rx="10" fill="#f5f5f7"/>
  <text x="300" y="584" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Global Intermediary Identification Number</text>

  <!-- Section 2: Primary Contact -->
  <text x="280" y="650" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="11" font-weight="600" fill="#86868b" letter-spacing="1">PRIMARY CONTACT</text>

  <!-- Full Name -->
  <text x="280" y="690" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">Full Name</text>
  <rect x="280" y="700" width="640" height="48" rx="10" fill="#f5f5f7"/>
  <text x="300" y="730" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Contact person's full name</text>

  <!-- Email -->
  <text x="280" y="778" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">Email</text>
  <rect x="280" y="788" width="640" height="48" rx="10" fill="#f5f5f7"/>
  <text x="300" y="818" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">email@example.com</text>

  <!-- Position -->
  <text x="280" y="866" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">Position</text>
  <rect x="280" y="876" width="308" height="48" rx="10" fill="#f5f5f7"/>
  <text x="300" y="906" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Job title</text>

  <!-- Phone -->
  <text x="612" y="866" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">Phone</text>
  <rect x="612" y="876" width="308" height="48" rx="10" fill="#f5f5f7"/>
  <text x="632" y="906" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">+1 (000) 000-0000</text>

  <!-- Section 3: Documents -->
  <text x="280" y="975" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="11" font-weight="600" fill="#86868b" letter-spacing="1">DOCUMENTS</text>

  <!-- Upload Zone 1 -->
  <rect x="280" y="995" width="308" height="120" rx="12" fill="none" stroke="#e0e0e5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="434" y="1050" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="22" fill="#c7c7cc" text-anchor="middle">+</text>
  <text x="434" y="1080" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#86868b" text-anchor="middle">Passport scan</text>

  <!-- Upload Zone 2 -->
  <rect x="612" y="995" width="308" height="120" rx="12" fill="none" stroke="#e0e0e5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="766" y="1050" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="22" fill="#c7c7cc" text-anchor="middle">+</text>
  <text x="766" y="1080" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#86868b" text-anchor="middle">Authorization letter</text>

  <!-- Submit Button -->
  <rect x="430" y="1170" width="340" height="52" rx="10" fill="#0071e3"/>
  <text x="600" y="1202" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="16" font-weight="500" fill="#ffffff" text-anchor="middle">Submit Enrolment</text>
</svg>