<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Page Background -->
  <rect width="1200" height="800" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="64" fill="#ffffff"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="18" font-weight="700" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="127" cy="33" r="3" fill="#0071e3"/>
  <text x="145" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Tax Reporting Portal</text>

  <!-- Card Shadow Filter -->
  <defs>
    <filter id="cardShadow" x="-20" y="-20" width="calc(100% + 40)" height="calc(100% + 40)">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Centered Card -->
  <rect x="360" y="180" width="480" height="460" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Lock Icon (line art) -->
  <g transform="translate(576, 220)">
    <rect x="8" y="20" width="32" height="24" rx="4" stroke="#86868b" stroke-width="1.5" fill="none"/>
    <path d="M14 20V14C14 8.477 18.477 4 24 4C29.523 4 34 8.477 34 14V20" stroke="#86868b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="24" cy="33" r="2.5" fill="#86868b"/>
  </g>

  <!-- Title -->
  <text x="600" y="295" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="24" font-weight="600" fill="#1d1d1f" text-anchor="middle">Verify your identity</text>

  <!-- Subtitle -->
  <text x="600" y="325" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" fill="#6e6e73" text-anchor="middle">Complete the security check to begin enrolment</text>

  <!-- reCAPTCHA Box -->
  <rect x="410" y="365" width="380" height="76" rx="12" fill="#f5f5f7" stroke="#e8e8ed" stroke-width="1"/>

  <!-- Checkbox -->
  <rect x="434" y="391" width="24" height="24" rx="4" fill="#ffffff" stroke="#d1d1d6" stroke-width="1.5"/>

  <!-- Checkbox label -->
  <text x="472" y="408" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#1d1d1f">I'm not a robot</text>

  <!-- reCAPTCHA logo placeholder -->
  <g transform="translate(720, 385)">
    <rect width="48" height="48" rx="4" fill="none"/>
    <path d="M24 8L24 20M24 20L32 14M24 20L16 14" stroke="#86868b" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <text x="24" y="42" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="8" fill="#86868b" text-anchor="middle">reCAPTCHA</text>
  </g>

  <!-- Continue Button -->
  <rect x="410" y="475" width="380" height="50" rx="10" fill="#0071e3"/>
  <text x="600" y="505" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="16" font-weight="500" fill="#ffffff" text-anchor="middle">Continue</text>

  <!-- Footer -->
  <text x="600" y="760" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" fill="#c7c7cc" text-anchor="middle">OECD Common Reporting Standard</text>
</svg>