  <text x="360" y="280" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">CRS</text>
  <text x="500" y="280" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">2025</text>
  <circle cx="610" cy="276" r="4" fill="#1a7f37"/>
  <text x="620" y="280" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#1a7f37">Transmitted</text>
  <text x="800" y="280" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">15 Mar 2026</text>
  <text x="1080" y="280" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#0071e3">↓</text>

  <line x1="72" y1="296" x2="1128" y2="296" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Row 2 -->
  <text x="72" y="336" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">CRS Correction 2025</text>
  <text x="360" y="336" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">CRS</text>
  <text x="500" y="336" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">2025</text>
  <circle cx="610" cy="332" r="4" fill="#0550ae"/>
  <text x="620" y="336" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#0550ae">Submitted</text>
  <text x="800" y="336" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">20 Mar 2026</text>
  <text x="1080" y="336" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">—</text>

  <line x1="72" y1="352" x2="1128" y2="352" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Row 3 -->
  <text x="72" y="392" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">CRS Annual 2024</text>
  <text x="360" y="392" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">CRS</text>
  <text x="500" y="392" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">2024</text>
  <circle cx="610" cy="388" r="4" fill="#1a7f37"/>
  <text x="620" y="392" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#1a7f37">Transmitted</text>
  <text x="800" y="392" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">28 Mar 2025</text>
  <text x="1080" y="392" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#0071e3">↓</text>

  <line x1="72" y1="408" x2="1128" y2="408" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Row 4 -->
  <text x="72" y="448" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">CbC Report FY2024</text>
  <text x="360" y="448" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">CbC</text>
  <text x="500" y="448" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">2024</text>
  <circle cx="610" cy="444" r="4" fill="#1a7f37"/>
  <text x="620" y="448" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#1a7f37">Transmitted</text>
  <text x="800" y="448" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">15 Apr 2025</text>
  <text x="1080" y="448" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#0071e3">↓</text>

  <line x1="72" y1="464" x2="1128" y2="464" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Row 5 -->
  <text x="72" y="504" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">CRS Nil 2023</text>
  <text x="360" y="504" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">CRS (Nil)</text>
  <text x="500" y="504" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">2023</text>
  <circle cx="610" cy="500" r="4" fill="#1a7f37"/>
  <text x="620" y="504" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#1a7f37">Transmitted</text>
  <text x="800" y="504" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">30 Mar 2024</text>
  <text x="1080" y="504" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#0071e3">↓</text>
</svg>