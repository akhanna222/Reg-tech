<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <style>
      text { font-family: Inter, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f8fafc"/>

  <!-- Header -->
  <rect width="1200" height="64" fill="#1a365d"/>
  <text x="40" y="38" fill="white" font-size="18" font-weight="700">Bermuda Tax Information Reporting Portal</text>
  <rect x="520" y="18" width="80" height="30" rx="4" fill="transparent"/>
  <text x="540" y="38" fill="#94a3b8" font-size="13" font-weight="500">Filings</text>
  <rect x="610" y="18" width="120" height="30" rx="4" fill="#2d4a7a"/>
  <text x="622" y="38" fill="white" font-size="13" font-weight="500">Administration</text>

  <!-- Page Title -->
  <text x="40" y="110" fill="#1e293b" font-size="22" font-weight="700">Reporting Entity Deactivation</text>

  <!-- Form Card -->
  <rect x="40" y="130" width="1120" height="740" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Reason for Deactivation -->
  <text x="70" y="168" fill="#374151" font-size="13" font-weight="600">Reason for Deactivation</text>
  <rect x="70" y="178" width="400" height="38" rx="4" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="85" y="202" fill="#1e293b" font-size="13">Dissolution of Company ▾</text>
  <!-- Dropdown options hint -->
  <text x="490" y="195" fill="#9ca3af" font-size="11" font-style="italic">(Dissolution, Strike off, Termination of Trust,</text>
  <text x="490" y="210" fill="#9ca3af" font-size="11" font-style="italic">Transfer by Continuation, No longer MNE, Other)</text>

  <!-- Deactivation Date -->
  <text x="70" y="248" fill="#374151" font-size="13" font-weight="600">Deactivation Date</text>
  <rect x="70" y="258" width="200" height="38" rx="4" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="85" y="282" fill="#1e293b" font-size="13">15/03/2026</text>
  <text x="240" y="282" fill="#9ca3af" font-size="14">📅</text>

  <!-- Contact Information Section -->
  <text x="70" y="328" fill="#1e293b" font-size="15" font-weight="700">Contact Information</text>
  <rect x="70" y="338" width="1060" height="2" fill="#e2e8f0"/>

  <text x="70" y="370" fill="#374151" font-size="12" font-weight="600">Primary User</text>
  <!-- Name -->
  <text x="70" y="395" fill="#6b7280" font-size="11">Name</text>
  <rect x="70" y="400" width="300" height="34" rx="4" fill="#f1f5f9" stroke="#d1d5db" stroke-width="1"/>
  <text x="85" y="422" fill="#374151" font-size="12">James Hamilton</text>
  <!-- Email -->
  <text x="390" y="395" fill="#6b7280" font-size="11">Email</text>
  <rect x="390" y="400" width="300" height="34" rx="4" fill="#f1f5f9" stroke="#d1d5db" stroke-width="1"/>
  <text x="405" y="422" fill="#374151" font-size="12">james@celticfs.bm</text>
  <!-- Position -->
  <text x="710" y="395" fill="#6b7280" font-size="11">Position</text>
  <rect x="710" y="400" width="300" height="34" rx="4" fill="#f1f5f9" stroke="#d1d5db" stroke-width="1"/>
  <text x="725" y="422" fill="#374151" font-size="12">Compliance Officer</text>

  <!-- Records Address -->
  <text x="70" y="468" fill="#374151" font-size="12" font-weight="600">Records Address</text>
  <!-- Street -->
  <text x="70" y="490" fill="#6b7280" font-size="11">Street</text>
  <rect x="70" y="496" width="500" height="34" rx="4" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="85" y="518" fill="#374151" font-size="12">12 Front Street</text>
  <!-- City -->
  <text x="590" y="490" fill="#6b7280" font-size="11">City</text>
  <rect x="590" y="496" width="200" height="34" rx="4" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="605" y="518" fill="#374151" font-size="12">Hamilton</text>
  <!-- Country -->
  <text x="810" y="490" fill="#6b7280" font-size="11">Country</text>
  <rect x="810" y="496" width="200" height="34" rx="4" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="825" y="518" fill="#374151" font-size="12">Bermuda</text>

  <!-- Evidence Section -->
  <text x="70" y="568" fill="#1e293b" font-size="15" font-weight="700">Evidence</text>
  <rect x="70" y="578" width="1060" height="2" fill="#e2e8f0"/>

  <!-- Type of Evidence -->
  <text x="70" y="608" fill="#374151" font-size="13" font-weight="600">Type of Evidence</text>
  <rect x="70" y="616" width="400" height="38" rx="4" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="85" y="640" fill="#1e293b" font-size="13">Certificate of Dissolution ▾</text>

  <!-- Upload zone -->
  <text x="70" y="680" fill="#374151" font-size="13" font-weight="600">Upload evidence document</text>
  <rect x="70" y="688" width="500" height="60" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="320" y="722" fill="#6b7280" font-size="12" text-anchor="middle">Drag and drop or click to browse</text>

  <!-- Confirmations -->
  <text x="70" y="778" fill="#1e293b" font-size="15" font-weight="700">Confirmations</text>
  <rect x="70" y="788" width="1060" height="2" fill="#e2e8f0"/>

  <!-- Checkbox 1 -->
  <rect x="70" y="802" width="16" height="16" rx="3" fill="#2563eb" stroke="#2563eb" stroke-width="1"/>
  <text x="72" y="815" fill="white" font-size="12" font-weight="700">✓</text>
  <text x="96" y="815" fill="#374151" font-size="12">All filing obligations have been fulfilled</text>

  <!-- Checkbox 2 -->
  <rect x="70" y="828" width="16" height="16" rx="3" fill="#2563eb" stroke="#2563eb" stroke-width="1"/>
  <text x="72" y="841" fill="white" font-size="12" font-weight="700">✓</text>
  <text x="96" y="841" fill="#374151" font-size="12">All CTS error notifications have been addressed</text>

  <!-- Checkbox 3 -->
  <rect x="70" y="854" width="16" height="16" rx="3" fill="#2563eb" stroke="#2563eb" stroke-width="1"/>
  <text x="72" y="867" fill="white" font-size="12" font-weight="700">✓</text>
  <text x="96" y="867" fill="#374151" font-size="12">I confirm the information above is accurate</text>

  <!-- Buttons -->
  <rect x="940" y="830" width="130" height="38" rx="6" fill="#2563eb"/>
  <text x="960" y="854" fill="white" font-size="13" font-weight="600">Validate &amp; Save</text>
  <rect x="800" y="830" width="120" height="38" rx="6" fill="#059669"/>
  <text x="835" y="854" fill="white" font-size="13" font-weight="600">Submit</text>
</svg>