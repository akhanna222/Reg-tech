<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- Page Background -->
  <rect width="1200" height="700" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="56" fill="#ffffff"/>
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="35" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="17" font-weight="700" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="120" cy="30" r="3.5" fill="#0071e3"/>

  <!-- Nav -->
  <text x="180" y="35" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#6e6e73">Dashboard</text>
  <text x="270" y="35" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="600" fill="#0071e3">Enrolments</text>
  <text x="370" y="35" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#6e6e73">Filings</text>
  <text x="440" y="35" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#6e6e73">History</text>
  <text x="510" y="35" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#6e6e73">Analytics</text>

  <!-- Title Section -->
  <text x="40" y="112" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="28" font-weight="700" fill="#1d1d1f">Enrolment Reviews</text>
  <!-- Badge -->
  <rect x="290" y="94" width="90" height="26" rx="13" fill="#fff8e6"/>
  <text x="306" y="112" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="600" fill="#9a6700">2 pending</text>

  <!-- Card 1 -->
  <rect x="40" y="148" width="1120" height="120" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Card 1 Left -->
  <text x="72" y="186" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="16" font-weight="600" fill="#1d1d1f">New Dublin Finance Ltd</text>
  <text x="72" y="210" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#6e6e73">Financial Institution · CRS</text>

  <!-- Card 1 Middle -->
  <text x="440" y="186" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#6e6e73">Submitted 12 Mar 2026</text>
  <!-- Document links -->
  <rect x="440" y="198" width="80" height="28" rx="6" fill="#f5f5f7"/>
  <text x="452" y="216" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#1d1d1f">Passport ↓</text>
  <rect x="530" y="198" width="68" height="28" rx="6" fill="#f5f5f7"/>
  <text x="542" y="216" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#1d1d1f">Letter ↓</text>

  <!-- Card 1 Right -->
  <rect x="920" y="176" width="90" height="34" rx="17" fill="#e8faf0"/>
  <text x="942" y="198" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="600" fill="#1a7f37">Approve</text>
  <rect x="1020" y="176" width="80" height="34" rx="17" fill="none" stroke="#cf222e" stroke-width="1.5"/>
  <text x="1038" y="198" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#cf222e">Decline</text>

  <!-- Card 2 -->
  <rect x="40" y="288" width="1120" height="120" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Card 2 Left -->
  <text x="72" y="326" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="16" font-weight="600" fill="#1d1d1f">Bermuda Reinsurance (UPE)</text>
  <text x="72" y="350" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#6e6e73">Multinational · CbC</text>

  <!-- Card 2 Middle -->
  <text x="440" y="326" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#6e6e73">Submitted 13 Mar 2026</text>
  <rect x="440" y="338" width="80" height="28" rx="6" fill="#f5f5f7"/>
  <text x="452" y="356" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#1d1d1f">Passport ↓</text>
  <rect x="530" y="338" width="68" height="28" rx="6" fill="#f5f5f7"/>
  <text x="542" y="356" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#1d1d1f">Letter ↓</text>

  <!-- Card 2 Right -->
  <rect x="920" y="316" width="90" height="34" rx="17" fill="#e8faf0"/>
  <text x="942" y="338" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="600" fill="#1a7f37">Approve</text>
  <rect x="1020" y="316" width="80" height="34" rx="17" fill="none" stroke="#cf222e" stroke-width="1.5"/>
  <text x="1038" y="338" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#cf222e">Decline</text>

  <!-- Recently Processed Section -->
  <rect x="40" y="448" width="1120" height="52" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>
  <text x="72" y="480" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" font-weight="600" fill="#1d1d1f">Recently processed</text>
  <text x="1108" y="480" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="16" fill="#86868b">›</text>
</svg>