<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Page Background -->
  <rect width="1200" height="700" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="64" fill="#ffffff"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="18" font-weight="700" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="127" cy="33" r="3" fill="#0071e3"/>
  <text x="145" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Tax Reporting Portal</text>

  <!-- Card Shadow Filter -->
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Centered Card -->
  <rect x="360" y="100" width="480" height="555" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Shield Icon -->
  <g transform="translate(576, 135)">
    <path d="M24 4L6 10V20C6 30 14 38 24 42C34 38 42 30 42 20V10L24 4Z" stroke="#1d1d1f" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <path d="M18 22L22 26L30 18" stroke="#0071e3" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="205" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="22" font-weight="600" fill="#1d1d1f" text-anchor="middle">Set up two-factor authentication</text>
  <text x="600" y="232" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73" text-anchor="middle">Scan this QR code with your authenticator app</text>

  <!-- QR Code Placeholder -->
  <rect x="530" y="255" width="140" height="140" rx="12" fill="#f5f5f7" stroke="#e8e8ed" stroke-width="1"/>
  <!-- QR pattern dots -->
  <g fill="#1d1d1f" opacity="0.7">
    <rect x="545" y="270" width="10" height="10" rx="1"/>
    <rect x="557" y="270" width="10" height="10" rx="1"/>
    <rect x="569" y="270" width="10" height="10" rx="1"/>
    <rect x="545" y="282" width="10" height="10" rx="1"/>
    <rect x="569" y="282" width="10" height="10" rx="1"/>
    <rect x="545" y="294" width="10" height="10" rx="1"/>
    <rect x="557" y="294" width="10" height="10" rx="1"/>
    <rect x="569" y="294" width="10" height="10" rx="1"/>

    <rect x="593" y="270" width="6" height="6" rx="1"/>
    <rect x="601" y="278" width="6" height="6" rx="1"/>
    <rect x="609" y="270" width="6" height="6" rx="1"/>
    <rect x="593" y="286" width="6" height="6" rx="1"/>
    <rect x="609" y="286" width="6" height="6" rx="1"/>

    <rect x="621" y="270" width="10" height="10" rx="1"/>
    <rect x="633" y="270" width="10" height="10" rx="1"/>
    <rect x="645" y="270" width="10" height="10" rx="1"/>
    <rect x="621" y="282" width="10" height="10" rx="1"/>
    <rect x="645" y="282" width="10" height="10" rx="1"/>
    <rect x="621" y="294" width="10" height="10" rx="1"/>
    <rect x="633" y="294" width="10" height="10" rx="1"/>
    <rect x="645" y="294" width="10" height="10" rx="1"/>

    <rect x="545" y="318" width="6" height="6" rx="1"/>
    <rect x="557" y="325" width="6" height="6" rx="1"/>
    <rect x="569" y="318" width="6" height="6" rx="1"/>
    <rect x="581" y="325" width="6" height="6" rx="1"/>
    <rect x="593" y="318" width="6" height="6" rx="1"/>
    <rect x="605" y="325" width="6" height="6" rx="1"/>
    <rect x="617" y="318" width="6" height="6" rx="1"/>
    <rect x="629" y="325" width="6" height="6" rx="1"/>
    <rect x="641" y="318" width="6" height="6" rx="1"/>

    <rect x="545" y="345" width="10" height="10" rx="1"/>
    <rect x="557" y="345" width="10" height="10" rx="1"/>
    <rect x="569" y="345" width="10" height="10" rx="1"/>
    <rect x="545" y="357" width="10" height="10" rx="1"/>
    <rect x="569" y="357" width="10" height="10" rx="1"/>
    <rect x="545" y="369" width="10" height="10" rx="1"/>
    <rect x="557" y="369" width="10" height="10" rx="1"/>
    <rect x="569" y="369" width="10" height="10" rx="1"/>
  </g>

  <!-- Manual entry -->
  <text x="600" y="425" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#86868b" text-anchor="middle">Or enter manually:</text>

  <!-- Code box -->
  <rect x="450" y="440" width="300" height="40" rx="8" fill="#f5f5f7"/>
  <text x="600" y="465" font-family="SF Mono, Menlo, monospace" font-size="14" font-weight="500" fill="#1d1d1f" text-anchor="middle">JBSWY3DPEHPK3PXP</text>

  <!-- 6 Digit Input Boxes -->
  <g transform="translate(405, 500)">
    <rect x="0" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
    <rect x="62" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
    <rect x="124" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
    <rect x="196" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
    <rect x="258" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
    <rect x="320" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
  </g>

  <!-- Verify Button -->
  <rect x="430" y="590" width="340" height="50" rx="10" fill="#0071e3"/>
  <text x="600" y="621" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="16" font-weight="500" fill="#ffffff" text-anchor="middle">Verify &amp; Enable</text>
