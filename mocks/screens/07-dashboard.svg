<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Page Background -->
  <rect width="1200" height="800" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="64" fill="#ffffff"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="18" font-weight="700" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="127" cy="33" r="3" fill="#0071e3"/>

  <!-- Nav Pills -->
  <rect x="180" y="18" width="72" height="30" rx="8" fill="#f5f5f7"/>
  <text x="216" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="600" fill="#1d1d1f" text-anchor="middle">Filings</text>

  <text x="290" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="400" fill="#6e6e73">History</text>

  <text x="365" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="400" fill="#6e6e73">Settings</text>

  <!-- Right side: bell + avatar -->
  <!-- Bell icon -->
  <g transform="translate(1090, 24)">
    <path d="M8 2C4.5 2 2 5 2 8V12L0 14H16L14 12V8C14 5 11.5 2 8 2Z" stroke="#6e6e73" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M6 14C6 15.1 6.9 16 8 16C9.1 16 10 15.1 10 14" stroke="#6e6e73" stroke-width="1.3" fill="none"/>
  </g>

  <!-- Avatar -->
  <circle cx="1145" cy="32" r="16" fill="#f5f5f7"/>
  <text x="1145" y="37" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">CM</text>

  <!-- Entity breadcrumb -->
  <g transform="translate(40, 90)">
    <circle cx="6" cy="6" r="4" fill="#1a7f37"/>
    <text x="18" y="10" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#1d1d1f">Celtic Financial Services Ltd</text>
  </g>

  <!-- Card Shadow Filter -->
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Metric Cards Row -->
  <!-- Card 1: Drafts -->
  <rect x="40" y="130" width="270" height="100" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>
  <text x="72" y="168" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="32" font-weight="700" fill="#1d1d1f">3</text>
  <text x="72" y="195" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">Drafts</text>

  <!-- Card 2: Submitted -->
  <rect x="330" y="130" width="270" height="100" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>
  <text x="362" y="168" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="32" font-weight="700" fill="#1d1d1f">12</text>
  <text x="362" y="195" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">Submitted</text>

  <!-- Card 3: Transmitted -->
  <rect x="620" y="130" width="270" height="100" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>
  <text x="652" y="168" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="32" font-weight="700" fill="#1d1d1f">8</text>
  <text x="652" y="195" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">Transmitted</text>

  <!-- Card 4: Error -->
  <rect x="910" y="130" width="250" height="100" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>
  <text x="942" y="168" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="32" font-weight="700" fill="#cf222e">1</text>
  <text x="942" y="195" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">Error</text>

  <!-- Draft Filings Section -->
  <rect x="40" y="270" width="1120" height="480" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Section header -->
  <text x="80" y="315" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="18" font-weight="600" fill="#1d1d1f">Draft Filings</text>

  <!-- New Filing button -->
  <rect x="1000" y="293" width="120" height="36" rx="10" fill="#0071e3"/>
  <text x="1060" y="316" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">New Filing</text>

  <!-- Table Header -->
  <text x="80" y="370" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#86868b">NAME</text>
  <text x="480" y="370" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#86868b">TYPE</text>
  <text x="620" y="370" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#86868b">PERIOD</text>
  <text x="800" y="370" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#86868b">MODIFIED</text>
  <line x1="80" y1="385" x2="1120" y2="385" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="80" y="425" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" font-weight="500" fill="#1d1d1f">CRS Annual 2025</text>
  <rect x="475" y="410" width="48" height="24" rx="6" fill="#eef6ff"/>
  <text x="499" y="427" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#0550ae" text-anchor="middle">CRS</text>
  <text x="620" y="425" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">31 Dec 2025</text>
  <text x="800" y="425" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">2 hours ago</text>
  <!-- Chevron -->
  <path d="M1105 420L1110 425L1105 430" stroke="#c7c7cc" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="80" y1="450" x2="1120" y2="450" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Row 2 -->
  <text x="80" y="490" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" font-weight="500" fill="#1d1d1f">CbC Report FY2025</text>
  <rect x="475" y="475" width="48" height="24" rx="6" fill="#eef6ff"/>
  <text x="499" y="492" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#0550ae" text-anchor="middle">CbC</text>
  <text x="620" y="490" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">31 Dec 2025</text>
  <text x="800" y="490" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">3 days ago</text>
  <!-- Chevron -->
  <path d="M1105 485L1110 490L1105 495" stroke="#c7c7cc" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <line x1="80" y1="515" x2="1120" y2="515" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Row 3 -->
  <text x="80" y="555" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" font-weight="500" fill="#1d1d1f">CRS Corrections Q4</text>
  <rect x="475" y="540" width="48" height="24" rx="6" fill="#eef6ff"/>
  <text x="499" y="557" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" font-weight="500" fill="#0550ae" text-anchor="middle">CRS</text>
  <text x="620" y="555" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">31 Dec 2025</text>
  <text x="800" y="555" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73">1 week ago</text>
  <!-- Chevron -->
  <path d="M1105 550L1110 555L1105 560" stroke="#c7c7cc" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>