<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, SF Pro Display, Inter, sans-serif">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04"/>
    </filter>
    <filter id="bottomBarShadow">
      <feDropShadow dx="0" dy="-2" stdDeviation="8" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="800" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="56" fill="#ffffff"/>
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="35" font-size="17" font-weight="600" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="108" cy="30" r="4" fill="#0071e3"/>

  <!-- Nav pills -->
  <rect x="420" y="14" width="80" height="28" rx="14" fill="#f5f5f7"/>
  <text x="460" y="33" font-size="13" fill="#1d1d1f" text-anchor="middle">Dashboard</text>
  <rect x="510" y="14" width="72" height="28" rx="14" fill="#0071e3"/>
  <text x="546" y="33" font-size="13" fill="#ffffff" text-anchor="middle">Filings</text>
  <rect x="592" y="14" width="80" height="28" rx="14" fill="#f5f5f7"/>
  <text x="632" y="33" font-size="13" fill="#1d1d1f" text-anchor="middle">Entities</text>
  <rect x="682" y="14" width="72" height="28" rx="14" fill="#f5f5f7"/>
  <text x="718" y="33" font-size="13" fill="#1d1d1f" text-anchor="middle">Reports</text>

  <!-- Avatar -->
  <circle cx="1140" cy="28" r="16" fill="#f5f5f7"/>
  <text x="1140" y="33" font-size="11" font-weight="500" fill="#6e6e73" text-anchor="middle">JD</text>

  <!-- Breadcrumb -->
  <text x="40" y="92" font-size="13" fill="#6e6e73">Filings</text>
  <text x="80" y="92" font-size="13" fill="#86868b">/</text>
  <text x="92" y="92" font-size="13" fill="#1d1d1f">CRS Annual 2025</text>

  <!-- Title + status -->
  <text x="40" y="130" font-size="28" font-weight="600" fill="#1d1d1f">CRS Annual 2025</text>
  <rect x="250" y="112" width="52" height="24" rx="12" fill="#f5f5f7"/>
  <text x="276" y="128" font-size="12" fill="#86868b" text-anchor="middle">Draft</text>

  <!-- Tab bar -->
  <rect x="40" y="156" width="112" height="32" rx="10" fill="#0071e3"/>
  <text x="96" y="176" font-size="13" fill="#ffffff" text-anchor="middle">Upload XML</text>
  <rect x="160" y="156" width="108" height="32" rx="10" fill="#f5f5f7"/>
  <text x="214" y="176" font-size="13" fill="#1d1d1f" text-anchor="middle">Manual Entry</text>
  <rect x="276" y="156" width="92" height="32" rx="10" fill="#f5f5f7"/>
  <text x="322" y="176" font-size="13" fill="#1d1d1f" text-anchor="middle">Validation</text>

  <!-- Content card -->
  <rect x="40" y="210" width="1120" height="490" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Upload zone -->
  <rect x="72" y="240" width="1056" height="260" rx="16" fill="#f8faff" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="8 4"/>

  <!-- Cloud upload icon -->
  <g transform="translate(570, 290)">
    <path d="M30 45 L30 25 M20 33 L30 23 L40 33" stroke="#86868b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M15 40 C5 40 0 34 0 28 C0 20 6 14 14 14 C16 6 24 0 33 0 C42 0 50 6 52 14 C58 14 64 20 64 28 C64 34 59 40 49 40" stroke="#86868b" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Upload text -->
  <text x="600" y="365" font-size="16" fill="#1d1d1f" text-anchor="middle">Drop your OECD CRS XML file here</text>
  <text x="600" y="392" font-size="14" fill="#0071e3" text-anchor="middle">or browse files</text>
  <text x="600" y="420" font-size="12" fill="#86868b" text-anchor="middle">Supports OECD CRS XML Schema v2.0 · Max 50MB</text>

  <!-- Previously uploaded section -->
  <text x="72" y="540" font-size="14" font-weight="500" fill="#1d1d1f">Previously uploaded</text>
  <line x1="72" y1="555" x2="1128" y2="555" stroke="#f0f0f0" stroke-width="1"/>

  <!-- File row -->
  <rect x="72" y="565" width="1056" height="48" rx="8" fill="#ffffff"/>
  <!-- File icon -->
  <rect x="88" y="575" width="24" height="28" rx="4" fill="#f5f5f7" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="100" y="594" font-size="7" fill="#86868b" text-anchor="middle">XML</text>
  <!-- File name -->
  <text x="124" y="594" font-size="14" fill="#1d1d1f">crs_2025_celtic.xml</text>
  <!-- File size -->
  <text x="320" y="594" font-size="13" fill="#86868b">2.3 MB</text>
  <!-- Green checkmark -->
  <circle cx="400" cy="589" r="10" fill="#e8faf0"/>
  <path d="M395 589 L399 593 L406 585" stroke="#1a7f37" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Date -->
  <text x="430" y="594" font-size="13" fill="#86868b">15 Mar 2026</text>

  <!-- Bottom bar -->
  <rect x="0" y="740" width="1200" height="60" fill="#ffffff" filter="url(#bottomBarShadow)"/>
  <rect x="960" y="754" width="160" height="36" rx="10" fill="#0071e3"/>
  <text x="1040" y="777" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">Submit for Validation</text>
  <rect x="820" y="754" width="120" height="36" rx="10" fill="#f5f5f7"/>
  <text x="880" y="777" font-size="14" font-weight="500" fill="#1d1d1f" text-anchor="middle">Save Draft</text>
</svg>