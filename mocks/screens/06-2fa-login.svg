<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Page Background -->
  <rect width="1200" height="600" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="64" fill="#ffffff"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="18" font-weight="700" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="127" cy="33" r="3" fill="#0071e3"/>
  <text x="145" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Tax Reporting Portal</text>

  <!-- Card Shadow Filter -->
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Centered Card -->
  <rect x="390" y="110" width="420" height="400" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Shield/Lock Icon -->
  <g transform="translate(581, 145)">
    <rect x="6" y="16" width="26" height="20" rx="3" stroke="#1d1d1f" stroke-width="1.5" fill="none"/>
    <path d="M11 16V11C11 6.582 14.582 3 19 3C23.418 3 27 6.582 27 11V16" stroke="#1d1d1f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="19" cy="27" r="2" fill="#0071e3"/>
  </g>

  <!-- Title -->
  <text x="600" y="210" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="22" font-weight="600" fill="#1d1d1f" text-anchor="middle">Enter verification code</text>
  <text x="600" y="238" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#6e6e73" text-anchor="middle">Open your authenticator app and enter the 6-digit code</text>

  <!-- 6 Digit Input Boxes -->
  <g transform="translate(412, 270)">
    <rect x="0" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
    <rect x="60" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
    <rect x="120" y="0" width="48" height="56" rx="10" fill="#ffffff" stroke="#0071e3" stroke-width="2"/>
    <rect x="180" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
    <rect x="240" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
    <rect x="300" y="0" width="48" height="56" rx="10" fill="#f5f5f7"/>
  </g>

  <!-- Cursor in active box -->
  <rect x="546" y="286" width="2" height="24" rx="1" fill="#0071e3" opacity="0.8"/>

  <!-- Verify Button -->
  <rect x="430" y="370" width="340" height="50" rx="10" fill="#0071e3"/>
  <text x="600" y="401" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="16" font-weight="500" fill="#ffffff" text-anchor="middle">Verify</text>

  <!-- Backup code link -->
  <text x="600" y="450" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#86868b" text-anchor="middle">Use backup code</text>
</svg>