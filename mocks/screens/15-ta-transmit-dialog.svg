<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, SF Pro Display, Inter, sans-serif">
  <defs>
    <filter id="modalShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Dimmed background overlay -->
  <rect width="1200" height="700" fill="#fafafa"/>
  <rect width="1200" height="700" fill="#000000" opacity="0.12"/>

  <!-- Modal card -->
  <rect x="320" y="40" width="560" height="620" rx="20" fill="#ffffff" filter="url(#modalShadow)"/>

  <!-- Modal title -->
  <text x="360" y="82" font-size="20" font-weight="600" fill="#1d1d1f">Confirm OECD CTS Transmission</text>
  <text x="360" y="106" font-size="13" fill="#6e6e73">Data will be transmitted via the OECD Common Transmission System</text>

  <!-- Separator -->
  <line x1="360" y1="126" x2="840" y2="126" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Filings section -->
  <text x="360" y="156" font-size="13" font-weight="500" fill="#86868b">FILINGS TO TRANSMIT</text>

  <!-- Filing row 1 -->
  <rect x="360" y="170" width="480" height="44" rx="8" fill="#fafafa"/>
  <text x="376" y="197" font-size="14" fill="#1d1d1f">Celtic FS → Germany (DE)</text>
  <text x="808" y="197" font-size="13" fill="#6e6e73" text-anchor="end">47 accounts</text>

  <!-- Filing row 2 -->
  <rect x="360" y="222" width="480" height="44" rx="8" fill="#fafafa"/>
  <text x="376" y="249" font-size="14" fill="#1d1d1f">Dublin IB → France (FR)</text>
  <text x="808" y="249" font-size="13" fill="#6e6e73" text-anchor="end">23 accounts</text>

  <!-- Separator -->
  <line x1="360" y1="286" x2="840" y2="286" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Pipeline section -->
  <text x="360" y="316" font-size="13" font-weight="500" fill="#86868b">TRANSMISSION PIPELINE</text>

  <!-- Step 1: Final Validation (green check) -->
  <circle cx="380" cy="348" r="10" fill="#e8faf0" stroke="#1a7f37" stroke-width="1.5"/>
  <path d="M375 348 L378 351 L385 344" stroke="#1a7f37" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="400" y="353" font-size="14" fill="#1d1d1f">Final Validation</text>
  <line x1="380" y1="358" x2="380" y2="376" stroke="#f0f0f0" stroke-width="1.5"/>

  <!-- Step 2: Dataset Lock -->
  <circle cx="380" cy="388" r="10" fill="none" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="400" y="393" font-size="14" fill="#6e6e73">Dataset Lock</text>
  <line x1="380" y1="398" x2="380" y2="416" stroke="#f0f0f0" stroke-width="1.5"/>

  <!-- Step 3: XML Packaging -->
  <circle cx="380" cy="428" r="10" fill="none" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="400" y="433" font-size="14" fill="#6e6e73">XML Packaging</text>
  <line x1="380" y1="438" x2="380" y2="456" stroke="#f0f0f0" stroke-width="1.5"/>

  <!-- Step 4: Encryption -->
  <circle cx="380" cy="468" r="10" fill="none" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="400" y="473" font-size="14" fill="#6e6e73">Encryption</text>
  <line x1="380" y1="478" x2="380" y2="496" stroke="#f0f0f0" stroke-width="1.5"/>

  <!-- Step 5: Signing -->
  <circle cx="380" cy="508" r="10" fill="none" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="400" y="513" font-size="14" fill="#6e6e73">Signing</text>
  <line x1="380" y1="518" x2="380" y2="536" stroke="#f0f0f0" stroke-width="1.5"/>

  <!-- Step 6: SFTP to OECD CTS -->
  <circle cx="380" cy="548" r="10" fill="none" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="400" y="553" font-size="14" fill="#6e6e73">SFTP to OECD CTS</text>
  <line x1="380" y1="558" x2="380" y2="576" stroke="#f0f0f0" stroke-width="1.5"/>

  <!-- Step 7: Await ACK -->
  <circle cx="380" cy="588" r="10" fill="none" stroke="#d0d0d0" stroke-width="1.5"/>
  <text x="400" y="593" font-size="14" fill="#6e6e73">Await ACK</text>

  <!-- Buttons -->
  <rect x="360" y="616" width="100" height="36" rx="10" fill="#f5f5f7"/>
  <text x="410" y="639" font-size="14" font-weight="500" fill="#1d1d1f" text-anchor="middle">Cancel</text>
  <rect x="640" y="616" width="200" height="36" rx="10" fill="#0071e3"/>
  <text x="740" y="639" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">Confirm Transmission</text>
</svg>