<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Page Background -->
  <rect width="1200" height="600" fill="#fafafa"/>

  <!-- Header -->
  <rect width="1200" height="64" fill="#ffffff"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Logo -->
  <text x="40" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="18" font-weight="700" fill="#1d1d1f">OECD AEOI</text>
  <circle cx="127" cy="33" r="3" fill="#0071e3"/>
  <text x="145" y="38" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="14" fill="#86868b">Tax Reporting Portal</text>

  <!-- Card Shadow Filter -->
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.04" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Centered Card -->
  <rect x="350" y="110" width="500" height="430" rx="16" fill="#ffffff" filter="url(#cardShadow)"/>

  <!-- Clock Icon Circle -->
  <circle cx="600" cy="175" r="28" fill="#fff8e6"/>
  <!-- Clock icon -->
  <circle cx="600" cy="175" r="14" stroke="#9a6700" stroke-width="1.5" fill="none"/>
  <path d="M600 167V175L605 179" stroke="#9a6700" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="600" y="235" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="24" font-weight="600" fill="#1d1d1f" text-anchor="middle">Application Pending</text>

  <!-- Entity Name -->
  <text x="600" y="265" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" fill="#6e6e73" text-anchor="middle">Celtic Financial Services Ltd</text>

  <!-- Status Pill -->
  <rect x="545" y="288" width="110" height="30" rx="15" fill="#fff8e6"/>
  <text x="600" y="308" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" font-weight="500" fill="#9a6700" text-anchor="middle">Under Review</text>

  <!-- Submitted date -->
  <text x="600" y="355" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#86868b" text-anchor="middle">Submitted</text>
  <text x="600" y="377" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="15" font-weight="500" fill="#1d1d1f" text-anchor="middle">15 March 2026</text>

  <!-- Info box -->
  <rect x="390" y="400" width="420" height="56" rx="10" fill="#f5f5f7"/>
  <text x="600" y="425" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#6e6e73" text-anchor="middle">We'll notify you by email once the</text>
  <text x="600" y="443" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="13" fill="#6e6e73" text-anchor="middle">review is complete.</text>

  <!-- Framework label -->
  <text x="600" y="495" font-family="-apple-system, SF Pro Display, Inter, sans-serif" font-size="12" fill="#c7c7cc" text-anchor="middle">Registered under OECD CRS framework</text>
</svg>