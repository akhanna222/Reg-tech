apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: reg-tech
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: reg-tech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: reg-tech/api:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: reg-tech
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: reg-tech
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: reg-tech
data:
  NODE_ENV: production
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_NAME: regtech
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: reg-tech
type: Opaque
stringData:
  DATABASE_USER: regtech
  DATABASE_PASSWORD: changeme-in-production
  JWT_SECRET: changeme-in-production
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: changeme-in-production
